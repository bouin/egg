

<f:if condition="{data.tx_mask_accordion_with_data}">
    <div class="w-full border-[#5a554f] akkordeon">
        <f:for each="{data.tx_mask_accordion_with_data}" as="data_item" iteration="iterator">
            <details class="group {f:if(condition: '{iterator.isFirst}==1', then: '', else: 'border-t border-[#5a554f]')} {f:if(condition: '{iterator.isLast}', then: 'border-b border-[#5a554f]')}">
                <summary class="cursor-pointer list-none py-10 px-4 md:px-12 md:pl-4 md:pr-14 md:py-8 uppercase text-[#46433f] marker:hidden grid grid-cols-[1fr_auto] items-center gap-2 lg:gap-6 text-right">
                    <span class="tracking-wid text-right">
                        <f:if condition="{data_item.tx_mask_title_of_the_immo}">
                            {data_item.tx_mask_title_of_the_immo}
                        </f:if>
                    </span>

                    <span class="text-2xl leading-none group-open:hidden pb-2">
                        +
                    </span>

                    <span class="text-2xl leading-none hidden group-open:block pb-2">
                        −
                    </span>
                </summary>

                <div class="akkordeon-content leading-relaxed text-[#46433f] font-20">
                    <div class="px-8 md:px-12 akkordeon-content-inner pb-12">
                        <f:if condition="{data_item.tx_mask_text_accordeon}">
                            {data_item.tx_mask_text_accordeon -> f:format.html()}
                        </f:if>
                    </div>
                </div>
            </details>
        </f:for>
    </div>
    <div class="w-full pt-40 md:pt-24 text-[20px] text-center pb-24 md:pb-0">
        <f:link.page pageUid="3" class="relative inline-block pb-1 group text-[20px]">
            Wohnwelt entdecken
            <span class="absolute bottom-0 left-0 h-px w-1/2 bg-[var(--font-dark)] transition-all duration-300 group-hover:w-full"></span>
        </f:link.page>
    </div>


</f:if>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const accordions = document.querySelectorAll('.akkordeon details');

        accordions.forEach((details) => {
            const summary = details.querySelector('summary');
            const content = details.querySelector('.akkordeon-content');

            content.style.maxHeight = details.open ? content.scrollHeight + 'px' : '0px';

            summary.addEventListener('click', function (e) {
                e.preventDefault();

                const isOpen = details.open;

                accordions.forEach((other) => {
                    const otherContent = other.querySelector('.akkordeon-content');

                    if (other !== details && other.open) {
                        otherContent.style.maxHeight = otherContent.scrollHeight + 'px';

                        requestAnimationFrame(() => {
                            otherContent.style.maxHeight = '0px';
                            otherContent.style.opacity = '0';
                        });

                        setTimeout(() => {
                            other.open = false;
                        }, 350);
                    }
                });

                if (!isOpen) {
                    details.open = true;
                    content.style.maxHeight = '0px';
                    content.style.opacity = '0';

                    requestAnimationFrame(() => {
                        content.style.maxHeight = content.scrollHeight + 'px';
                        content.style.opacity = '1';
                    });
                } else {
                    content.style.maxHeight = content.scrollHeight + 'px';

                    requestAnimationFrame(() => {
                        content.style.maxHeight = '0px';
                        content.style.opacity = '0';
                    });

                    setTimeout(() => {
                        details.open = false;
                    }, 350);
                }
            });
        });
    });
</script>
