
<!-- INFO PAGE -->
<main class="pt-40 md:pt-52">
    <!-- Page container -->
    <div class="mx-auto px-4 pb-24 mainnav-for-a-detail">
        <!-- Header / Brand + Nav -->

        <!-- Content: image left, text right -->
        <section class="grid grid-cols-1 gap-10 lg:grid-cols-12">
            <!-- Image column -->
            <f:if condition="{data.tx_mask_photo_info}">
                <f:then>
                    <f:for each="{data.tx_mask_photo_info}" as="file">
                        <figure class="lg:col-span-5">
                                <f:image fileExtension="webp" image="{file}" maxWidth="1800" class="w-full h-auto object-cover select-none"/>
                        </figure>
                    </f:for>
                </f:then>
                <f:else>
                    <figure class="lg:col-span-2">
                    </figure>
                </f:else>
            </f:if>

            <!-- Text column -->
            <div class=" lg:col-span-7 text-[clamp(14px,2.2vw,17px)] leading-[1.55] text-[20px] [&_a]:!text-[20px] [&_a]:!underline [&_a:hover]:!italic">
                <f:if condition="{data.tx_mask_text_info}">
                    {data.tx_mask_text_info -> f:transform.html()}
                </f:if>

                <f:if condition="{data.tx_mask_clients_first_colum} && {data.tx_mask_clienst_second_col}">
                    <!-- Selected Clients -->
                    <div class="[&_*]:text-[16px] md:[&_*]:text-[13px]">
                        <p class="mt-10 mb-2">Selected Clients</p>

                        <!-- Clients list: responsive multi-column grid -->
                        <ul class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-y-2 text-sm leading-snug ">
                            <f:if condition="{data.tx_mask_clients_first_colum}">
                                {data.tx_mask_clients_first_colum -> f:transform.html()}
                            </f:if>
                            <f:if condition="{data.tx_mask_clienst_second_col}">
                                {data.tx_mask_clienst_second_col -> f:transform.html()}
                            </f:if>
                        </ul>
                    </div>
                </f:if>
                <f:if condition="{data.tx_mask_impressum_and_so_on}">
                    <div class="[&_*]:text-[16px] md:[&_*]:text-[13px] [&_a]:!text-[13px] [&_a:hover]:italic pt-8 [&_p]:!pb-1">
                        {data.tx_mask_impressum_and_so_on -> f:transform.html()}
                    </div>
                </f:if>
            </div>

        </section>
    </div>
</main>
