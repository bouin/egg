                            <!-- Table scroll area -->
                            <div class="apartment-module__scroll h-[520px] overflow-y-auto" style="overscroll-behavior: auto;">


                                <table class="w-full border-collapse text-left text-lg">
                                    <thead class="bg-[#f4f1eb] sticky top-0 z-10">
                                    <tr class="border-b border-[#5a554f]">
                                        <th class="px-6 py-5 font-normal">No.</th>
                                        <th class="px-6 py-5 font-normal">Etage</th>
                                        <th class="px-6 py-5 font-normal">Zimmer</th>
                                        <th class="px-6 py-5 font-normal">Fläche m²</th>
                                        <th class="px-6 py-5 font-normal">Aussen m²</th>
                                        <th class="px-6 py-5 font-normal">Status</th>
                                        <th class="px-6 py-5 font-normal"></th>
                                        <th class="px-6 py-5 font-normal"></th>
                                    </tr>
                                    </thead>

                                    <tbody>
                                    <f:for each="{data.tx_mask_apartments}" as="data_item" iteration="iterator">
                                        <tr
                                                class="border-b border-[#5a554f] transition hover:bg-[#c7cdc3]"
                                                data-unit-key="{data_item.tx_mask_number}"
                                        >
                                            <td class="px-6 py-5">
                                                {data_item.tx_mask_number}
                                            </td>

                                            <td class="px-6 py-5">
                                                {data_item.tx_mask_floor}
                                            </td>

                                            <td class="px-6 py-5">
                                                {data_item.tx_mask_rooms}
                                            </td>

                                            <td class="px-6 py-5">
                                                {data_item.tx_mask_area}
                                            </td>

                                            <td class="px-6 py-5">
                                                {data_item.tx_mask_outside_area}
                                            </td>

                                            <td class="px-6 py-5">
                                                <f:variable name="status" value="{data_item.tx_mask_status}" />

                                                <f:switch expression="{status}">
                                                    <f:case value="0">Verfügbar</f:case>
                                                    <f:case value="1">Reserviert</f:case>
                                                    <f:case value="2">Vermietet</f:case>
                                                    <f:defaultCase>{status}</f:defaultCase>
                                                </f:switch>
                                            </td>

                                            <td class="px-6 py-5">
                                                <f:for each="{data_item.tx_mask_pdf}" as="file">
                                                    <a
                                                            href="{file.publicUrl}"
                                                            target="_blank"
                                                            class="apartment-link "
                                                    >
                                                        PDF
                                                    </a>
                                                </f:for>
                                            </td>

                                            <td class="px-6 py-5">
                                                <button
                                                        type="button"
                                                        class="apartment-request-trigger apartment-link"
                                                        data-apartment-number="{data_item.tx_mask_number}"
                                                        data-apartment-rooms="{data_item.tx_mask_rooms}"
                                                        data-apartment-floor="{data_item.tx_mask_floor}"
                                                >
                                                    Anfrage
                                                </button>
                                            </td>
                                        </tr>
                                    </f:for>
                                    </tbody>
                                </table>

                            </div>
                        </div>

                        <!-- Popup -->
                        <div class="apartment-modal fixed inset-0 z-50 hidden items-center justify-center bg-black/30 px-6">

                        <div class="relative grid w-full max-w-6xl grid-cols-1 overflow-hidden bg-[#d6dcd4] lg:grid-cols-2">

                                <!-- Image placeholder -->
                                <div class="hidden min-h-[620px] bg-[#c7cdc3] lg:block">
                                    <div class="flex h-full items-center justify-center text-[#46433f]/60">
                                        Bild / Kontaktperson
                                    </div>
                                </div>

                                <!-- Form placeholder -->
                                <div class="relative p-12 lg:p-16">
                                    <button
                                            type="button"
                                            class="apartment-modal-close absolute right-10 top-8 text-4xl font-light"
                                            aria-label="Close"
                                    >
                                        ×
                                    </button>

                                        <input class="w-full border-0 border-b border-[#5a554f] bg-transparent py-3 outline-none placeholder:text-[#46433f]" placeholder="Name*" />
                                        <input class="w-full border-0 border-b border-[#5a554f] bg-transparent py-3 outline-none placeholder:text-[#46433f]" placeholder="E-Mail*" />
                                        <input class="w-full border-0 border-b border-[#5a554f] bg-transparent py-3 outline-none placeholder:text-[#46433f]" placeholder="Telefonnummer*" />
                                        <textarea class="w-full border-0 border-b border-[#5a554f] bg-transparent py-3 outline-none placeholder:text-[#46433f]" rows="3" placeholder="Ihre Nachricht an uns"></textarea>

                                    <input type="hidden" class="apartment-modal-hidden-number" value="" />
                                    <input type="hidden" class="apartment-modal-hidden-floor" value="" />
                                    <input type="hidden" class="apartment-modal-hidden-rooms" value="" />

                                    <div class="mt-10 text-sm">
                                        Bitte alle erforderlichen Felder ausfüllen.*
                                    </div>

                                    <button
                                            type="button"
                                            class="mt-12 border-b border-[#46433f] pb-1 text-xl"
                                    >
                                        Anfrage senden
                                    </button>
                                </div>

                        </div>

                            <script>
                                (function () {
                                    const HIGHLIGHT = '#CBCEC8';

                                    document.querySelectorAll('.apartment-module').forEach(function (section) {
                                        const tableWrap = section.querySelector('.apartment-module__scroll');
                                        if (!tableWrap) return;

                                        /* ── Highlight ── */
                                        function getSvgShape(key) {
                                            return section.querySelector('svg [data-unit-key="' + CSS.escape(key) + '"]');
                                        }
                                        function getTableRow(key) {
                                            return section.querySelector('tr[data-unit-key="' + CSS.escape(key) + '"]');
                                        }
                                        function highlight(key, on) {
                                            var shape = getSvgShape(key);
                                            var row   = getTableRow(key);

                                            if (shape) {
                                                shape.querySelectorAll('polygon,path,rect').forEach(function (el) {
                                                    el.style.fill = on ? HIGHLIGHT : '';
                                                });
                                            }

                                            if (row) {
                                                row.style.backgroundColor = on ? HIGHLIGHT : '';
                                            }
                                        }

                                        section.querySelectorAll('tr[data-unit-key]').forEach(function (row) {
                                            row.addEventListener('mouseenter', function () {
                                                highlight(row.dataset.unitKey, true);
                                            });
                                            row.addEventListener('mouseleave', function () {
                                                highlight(row.dataset.unitKey, false);
                                            });
                                        });

                                        section.querySelectorAll('svg [data-unit-key]').forEach(function (g) {
                                            g.style.cursor = 'pointer';

                                            g.addEventListener('mouseenter', function () {
                                                highlight(g.dataset.unitKey, true);
                                            });
                                            g.addEventListener('mouseleave', function () {
                                                highlight(g.dataset.unitKey, false);
                                            });
                                        });

                                        /* ── Scroll helpers ── */
                                        var sticky = section.querySelector('.apartment-module__sticky');

                                        function shouldHijack() {
                                            if (!sticky) return false;
                                            var rect = sticky.getBoundingClientRect();
                                            return rect.top <= 0 && rect.bottom > 100;
                                        }

                                        function tableAtBottom() {
                                            return Math.ceil(tableWrap.scrollTop + tableWrap.clientHeight) >= tableWrap.scrollHeight - 1;
                                        }

                                        function tableAtTop() {
                                            return tableWrap.scrollTop <= 2;
                                        }

                                        /* ── Wheel na dokumencie ── */
                                        document.addEventListener('wheel', function (e) {
                                            if (!shouldHijack()) return;
                                            if (tableWrap.matches(':hover')) return;

                                            var down = e.deltaY > 0;

                                            if (down && !tableAtBottom()) {
                                                e.preventDefault();
                                                tableWrap.scrollBy({
                                                    top: Math.min(e.deltaY, 80),
                                                    behavior: 'auto'
                                                });
                                                return;
                                            }

                                            if (!down && !tableAtTop()) {
                                                e.preventDefault();
                                                tableWrap.scrollBy({
                                                    top: Math.max(e.deltaY, -80),
                                                    behavior: 'auto'
                                                });
                                                return;
                                            }

                                            // na końcu NIE blokujemy — strona scrolluje normalnie
                                        }, { passive: false });

                                        /* ── Wheel na tableWrap ── */
                                        tableWrap.addEventListener('wheel', function (e) {
                                            if (!shouldHijack()) return;

                                            var down = e.deltaY > 0;

                                            if (down && !tableAtBottom()) {
                                                e.preventDefault();
                                                e.stopPropagation();
                                                tableWrap.scrollBy({
                                                    top: Math.min(e.deltaY, 80),
                                                    behavior: 'auto'
                                                });
                                                return;
                                            }

                                            if (!down && !tableAtTop()) {
                                                e.preventDefault();
                                                e.stopPropagation();
                                                tableWrap.scrollBy({
                                                    top: Math.max(e.deltaY, -80),
                                                    behavior: 'auto'
                                                });
                                                return;
                                            }

                                            // KLUCZOWE:
                                            // nie robimy nic → przeglądarka scrolluje stronę dalej
                                        }, { passive: false });

                                        /* ── Touch ── */
                                        var lastTouchY = 0;

                                        document.addEventListener('touchstart', function (e) {
                                            lastTouchY = e.touches[0].clientY;
                                        }, { passive: true });

                                        document.addEventListener('touchmove', function (e) {
                                            if (!shouldHijack()) return;

                                            var currentY = e.touches[0].clientY;
                                            var delta = lastTouchY - currentY;
                                            lastTouchY = currentY;

                                            var down = delta > 0;

                                            if (down && !tableAtBottom()) {
                                                e.preventDefault();
                                                tableWrap.scrollBy({
                                                    top: Math.min(delta, 80),
                                                    behavior: 'auto'
                                                });
                                                return;
                                            }

                                            if (!down && !tableAtTop()) {
                                                e.preventDefault();
                                                tableWrap.scrollBy({
                                                    top: Math.max(delta, -80),
                                                    behavior: 'auto'
                                                });
                                                return;
                                            }

                                            // na końcach pozwalamy stronie scrollować
                                        }, { passive: false });

                                        /* ── Modal ── */
                                        section.querySelectorAll('.apartment-request-trigger').forEach(function (btn) {
                                            btn.addEventListener('click', function () {
                                                var modal = section.querySelector('.apartment-modal');
                                                if (!modal) return;

                                                modal.querySelector('.apartment-modal-hidden-number').value =
                                                    btn.dataset.apartmentNumber || '';

                                                modal.querySelector('.apartment-modal-hidden-floor').value =
                                                    btn.dataset.apartmentFloor || '';

                                                modal.querySelector('.apartment-modal-hidden-rooms').value =
                                                    btn.dataset.apartmentRooms || '';

                                                modal.querySelector('.apartment-modal-title').textContent =
                                                    'Wohnung ' + (btn.dataset.apartmentNumber || '');

                                                modal.classList.remove('hidden');
                                                modal.classList.add('flex');
                                            });
                                        });

                                        var closeBtn = section.querySelector('.apartment-modal-close');
                                        if (closeBtn) {
                                            closeBtn.addEventListener('click', function () {
                                                var modal = section.querySelector('.apartment-modal');
                                                modal.classList.add('hidden');
                                                modal.classList.remove('flex');
                                            });
                                        }
                                    });
                                })();
                            </script>
    </section>
</f:if>
