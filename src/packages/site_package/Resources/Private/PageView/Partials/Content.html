<f:for each="{records}" as="record" iteration="iterator">
        <f:if condition="{iterator.isFirst}">
                <f:then>
                    <section class="relative">
                        <f:cObject
                                typoscriptObjectPath="{record.mainType}"
                                data="{record}"
                                table="{record.mainType}"
                        />
                    </section>
                </f:then>
            <f:else>
                <section id="work-{data.uid}" class="relative z-20">
                    <f:cObject
                            typoscriptObjectPath="{record.mainType}"
                            data="{record}"
                            table="{record.mainType}"
                    />
                </section>
            </f:else>
        </f:if>
</f:for>
