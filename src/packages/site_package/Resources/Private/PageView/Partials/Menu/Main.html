<div class="min-h-screen bg-stone-100 text-stone-800">
    <f:debug>{_all}</f:debug>
    <f:if condition="{media}">
        <f:then>
            <f:for each="{media}" as="image" iteration="iterator">
                <f:if condition="{iterator.isFirst}">
                    <section class="relative h-[78vh] min-h-[640px] overflow-hidden bg-black">
                        <f:image
                                image="{image}"
                                alt="{image.alternative -> f:if(then: image.alternative, else: 'Grünegg')}"
                                class="absolute inset-0 h-full w-full object-cover"
                                loading="eager"
                                width="2000c"
                                height="1200c"
                        />

                        <div class="absolute inset-0 bg-black/15"></div>

                        <div class="relative z-10 flex h-full items-center justify-center px-6">
                            <img
                                    src="{f:uri.resource(path: 'Images/logo1.svg', extensionName: 'SitePackage')}"
                                    alt="Grünegg"
                                    class="w-full max-w-[1150px]"
                            />
                        </div>

                        <a
                                href="#content"
                                class="absolute right-0 top-1/2 z-20 -translate-y-1/2 rounded-l-3xl bg-slate-200/95 px-5 py-10 text-[18px] font-light tracking-wide text-stone-700 shadow-md transition hover:bg-slate-100"
                        >
                        <span class="block origin-center rotate-[-90deg] whitespace-nowrap">
                          Dokumentation anfordern
                        </span>
                        </a>
                    </section>
                </f:if>
            </f:for>
        </f:then>

        <f:else>
            <section class="relative h-[78vh] min-h-[640px] bg-stone-300">
                <div class="flex h-full items-center justify-center px-6">
                    <img
                            src="{f:uri.resource(path: 'Images/logo1.svg', extensionName: 'SitePackage')}"
                            alt="Grünegg"
                            class="w-full max-w-[1150px]"
                    />
                </div>
            </section>
        </f:else>
    </f:if>

    <header class="border-t border-stone-300 bg-stone-100">
        <div class="mx-auto flex max-w-screen-2xl items-center justify-between px-8 py-8 md:px-12">
            <a href="{f:uri.page(pageUid: 1)}" class="shrink-0">
                <img
                        src="{f:uri.resource(path: 'Images/logo1.svg', extensionName: 'SitePackage')}"
                        alt="Grünegg"
                        class="h-auto w-[220px] md:w-[280px]"
                />
            </a>

            <nav class="hidden md:block">
                <ul class="flex items-center gap-16 lg:gap-24">
                    <f:for each="{mainnavigation}" as="item">
                        <li>
                            <a
                                    href="{item.link}"
                                    target="{item.target}"
                                    class="text-[20px] font-light tracking-tight transition hover:text-stone-500
                                    <f:if condition='{item.current} || {item.active}'>text-stone-900</f:if>"
                            >
                                {item.title}
                            </a>
                        </li>
                    </f:for>
                </ul>
            </nav>
        </div>
    </header>
</div>
